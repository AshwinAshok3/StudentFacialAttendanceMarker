<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SFAM — Student Facial Attendance Marker. Biometric kiosk.">
    <title>SFAM — Attendance System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ---- Model loading overlay (P4) ---- */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: var(--navy);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            z-index: 9999;
            transition: opacity .5s ease;
        }

        #loadingOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-logo {
            font-size: 4rem;
            animation: pulse-green 2s infinite;
        }

        .loading-title {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .loading-sub {
            color: rgba(255, 255, 255, .5);
            font-size: .9rem;
            text-align: center;
            max-width: 300px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(0, 180, 216, .2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .9s linear infinite;
        }

        .loading-status {
            color: var(--accent);
            font-size: .85rem;
            font-weight: 500;
            min-height: 1.2em;
        }

        /* ---- Fade-in for kiosk layout (P5) ---- */
        .kiosk-layout {
            opacity: 0;
            transition: opacity .6s ease;
        }

        .kiosk-layout.visible {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- ========================================================================
     P4: Model Loading Screen — shown until /api/health returns ready:true
     ====================================================================== -->
    <div id="loadingOverlay">
        <div class="loading-logo">🎓</div>
        <div class="loading-title">SFAM</div>
        <div class="loading-sub">Student Facial Attendance Marker</div>
        <div class="loading-spinner"></div>
        <div class="loading-status" id="loadingStatus">Connecting to server…</div>
    </div>

    <!-- ========================================================================
     Main Kiosk Layout
     ====================================================================== -->
    <div class="kiosk-layout" id="kioskLayout">

        <!-- LEFT: Camera Feed -->
        <div class="kiosk-camera-pane">
            <div class="kiosk-cam-header">
                <span class="live-badge">LIVE</span>
                SFAM — Biometric Attendance System
            </div>

            <video id="kioskVideo" autoplay playsinline muted></video>
            <canvas id="kioskCanvas"></canvas>

            <!-- Non-blocking alert banner (P2 — managed by camera.js) -->
            <div id="kioskAlert" class="kiosk-alert" style="display:none;"></div>

            <div class="kiosk-status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span class="kiosk-status-text" id="statusText">Initializing…</span>
            </div>
        </div>

        <!-- RIGHT: Side Panel -->
        <div class="kiosk-side-panel">

            <div class="kiosk-brand">
                <div class="brand-icon">🎓</div>
                <h1>SFAM</h1>
                <p>Look directly at the camera to mark your attendance automatically.</p>
            </div>

            <div class="kiosk-actions">

                <div class="kiosk-section-label">Login</div>

                <button class="kiosk-btn" id="btnStudentLogin">
                    <div class="kiosk-btn-icon">👤</div>
                    <div class="kiosk-btn-text">
                        Student Login
                        <small>Roll No / Reg No + Password</small>
                    </div>
                </button>

                <button class="kiosk-btn" id="btnStaffLogin">
                    <div class="kiosk-btn-icon">🏫</div>
                    <div class="kiosk-btn-text">
                        Staff Login
                        <small>Employee Code + Password</small>
                    </div>
                </button>

                <button class="kiosk-btn" id="btnAdminLogin">
                    <div class="kiosk-btn-icon">🛡️</div>
                    <div class="kiosk-btn-text">
                        Admin Login
                        <small>System administrator</small>
                    </div>
                </button>

                <div class="kiosk-section-label">Register</div>

                <button class="kiosk-btn" id="btnRegisterStudent">
                    <div class="kiosk-btn-icon">📝</div>
                    <div class="kiosk-btn-text">
                        Register as Student
                        <small>New account + face scan</small>
                    </div>
                </button>

                <button class="kiosk-btn" id="btnRegisterStaff">
                    <div class="kiosk-btn-icon">💼</div>
                    <div class="kiosk-btn-text">
                        Register as Staff
                        <small>New account + face scan</small>
                    </div>
                </button>

            </div>

            <!-- Last detected -->
            <div class="kiosk-last-detected">
                <h4>Last Detected</h4>
                <div class="kiosk-detected-name" id="lastDetectedName">—</div>
                <div class="kiosk-detected-time" id="lastDetectedTime">Waiting for face…</div>
            </div>

        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/camera.js"></script>
    <script>
        (function () {
            'use strict';

            // Redirect if already logged in
            var s = getSession();
            if (s) { redirectToDashboard(s.user.role); return; }

            // -----------------------------------------------------------------------
            // P4: Health-check loop — poll until model is ready
            // -----------------------------------------------------------------------
            var POLL_INTERVAL_MS = 2000;
            var MAX_POLLS = 60;   // give up after 2 minutes
            var pollCount = 0;
            var cameraStarted = false;
            var overlay = document.getElementById('loadingOverlay');
            var statusEl = document.getElementById('loadingStatus');
            var layout = document.getElementById('kioskLayout');

            function pollHealth() {
                pollCount++;
                if (pollCount > MAX_POLLS) {
                    statusEl.textContent = 'Server not responding — check if server is running.';
                    statusEl.style.color = 'var(--danger)';
                    return;
                }

                apiHealthCheck()
                    .then(function (data) {
                        if (data && data.ready) {
                            statusEl.textContent = 'Face recognition engine ready ✓';
                            setTimeout(showKiosk, 500);
                        } else {
                            statusEl.textContent = (data && data.message) || 'Loading AI model…';
                            setTimeout(pollHealth, POLL_INTERVAL_MS);
                        }
                    })
                    .catch(function () {
                        statusEl.textContent = 'Waiting for server to start… (' + pollCount + ')';
                        setTimeout(pollHealth, POLL_INTERVAL_MS);
                    });
            }

            function showKiosk() {
                overlay.classList.add('hidden');
                layout.classList.add('visible');

                if (!cameraStarted) {
                    cameraStarted = true;
                    SFAMCamera.start('kioskVideo', 'kioskCanvas', 'kioskAlert');
                }
            }

            // Start polling immediately
            pollHealth();

            // -----------------------------------------------------------------------
            // Navigation
            // -----------------------------------------------------------------------
            document.getElementById('btnStudentLogin').onclick = function () {
                window.location.href = 'login.html?role=student';
            };
            document.getElementById('btnStaffLogin').onclick = function () {
                window.location.href = 'login.html?role=staff';
            };
            document.getElementById('btnAdminLogin').onclick = function () {
                window.location.href = 'login.html?role=admin';
            };
            document.getElementById('btnRegisterStudent').onclick = function () {
                window.location.href = 'register.html?role=student';
            };
            document.getElementById('btnRegisterStaff').onclick = function () {
                window.location.href = 'register.html?role=staff';
            };

        }());
    </script>
</body>

</html>
