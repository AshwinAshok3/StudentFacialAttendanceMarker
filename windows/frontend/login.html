<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFAM — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="auth-page">
        <div style="width:100%;max-width:440px;">

            <!-- Back to kiosk -->
            <button class="auth-back" id="btnBack">← Back to SFAM</button>

            <div class="auth-card">
                <div class="auth-logo">🎓</div>
                <div class="auth-title">
                    <h2 id="loginTitle">Student Login</h2>
                    <p id="loginSubtitle">Enter your Roll No or Registration No</p>
                </div>

                <!-- Role tabs -->
                <div class="role-tabs">
                    <button class="role-tab active" id="tabStudent">Student</button>
                    <button class="role-tab" id="tabStaff">Staff</button>
                </div>

                <form id="loginForm" autocomplete="off">
                    <div class="form-group">
                        <label for="loginIdentifier" id="identifierLabel">Roll No / Registration No</label>
                        <input type="text" id="loginIdentifier" placeholder="Enter your ID" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg">
                        Sign In
                    </button>
                </form>

                <p class="text-center mt-2" style="font-size:.88rem; color:var(--text-muted);">
                    Not registered? <a id="goRegister" href="register.html">Create an account</a>
                </p>
            </div>

        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // Redirect if already logged in
            var s = getSession();
            if (s) {
                if (s.user.role === 'admin') { window.location.href = 'admin.html'; }
                else { redirectToDashboard(s.user.role); }
                return;
            }

            // Pre-select role from URL param
            var params = new URLSearchParams(location.search);
            var defaultRole = params.get('role') || 'student';
            var currentRole = defaultRole;

            function setRole(role) {
                currentRole = role;
                document.getElementById('tabStudent').classList.toggle('active', role === 'student');
                document.getElementById('tabStaff').classList.toggle('active', role === 'staff');

                if (role === 'admin') {
                    document.getElementById('loginTitle').textContent = 'Admin Login';
                    document.getElementById('loginSubtitle').textContent = 'Enter your admin email address';
                    document.getElementById('identifierLabel').textContent = 'Admin Email';
                    document.getElementById('loginIdentifier').placeholder = 'e.g. admin@sfam.edu';
                    document.getElementById('goRegister').href = 'index.html';
                } else if (role === 'staff') {
                    document.getElementById('loginTitle').textContent = 'Staff Login';
                    document.getElementById('loginSubtitle').textContent = 'Enter your Employee Code';
                    document.getElementById('identifierLabel').textContent = 'Employee Code';
                    document.getElementById('loginIdentifier').placeholder = 'e.g. EMP-2024-001';
                    document.getElementById('goRegister').href = 'register.html?role=staff';
                } else {
                    document.getElementById('loginTitle').textContent = 'Student Login';
                    document.getElementById('loginSubtitle').textContent = 'Enter your Roll No or Registration No';
                    document.getElementById('identifierLabel').textContent = 'Roll No / Registration No';
                    document.getElementById('loginIdentifier').placeholder = 'e.g. CSE21001';
                    document.getElementById('goRegister').href = 'register.html?role=student';
                }
            }

            setRole(defaultRole);

            document.getElementById('tabStudent').onclick = function () { setRole('student'); };
            document.getElementById('tabStaff').onclick = function () { setRole('staff'); };
            document.getElementById('btnBack').onclick = function () { window.location.href = 'index.html'; };

            document.getElementById('loginForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                var btn = document.getElementById('loginBtn');
                var identifier = document.getElementById('loginIdentifier').value.trim();
                var password = document.getElementById('loginPassword').value;

                setLoading(btn, true, 'Signing in…');

                try {
                    var result = await apiLogin(identifier, password, currentRole);

                    if (result.error) {
                        showToast(result.error, 'error');
                        setLoading(btn, false, 'Sign In');
                        return;
                    }

                    saveSession(result.token, result.user);
                    showToast('Welcome, ' + result.user.name + '!', 'success', 1500);
                    setTimeout(function () {
                        if (result.user.role === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            redirectToDashboard(result.user.role);
                        }
                    }, 700);

                } catch (err) {
                    showToast('Connection error. Is the server running?', 'error');
                    setLoading(btn, false, 'Sign In');
                }
            });

        });
    </script>
</body>

</html>
