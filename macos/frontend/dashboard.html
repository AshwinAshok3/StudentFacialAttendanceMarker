<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFAM — Student Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="dash-layout">

    <!-- Top bar -->
    <header class="dash-topbar">
        <div class="dash-topbar-brand">🎓 Facial Attendance System</div>
        <div class="dash-topbar-user">
            <span id="topbarName">Loading…</span>
            <button class="btn btn-ghost btn-sm" id="btnLogout">Sign Out</button>
        </div>
    </header>

    <main class="dash-content">

        <!-- Profile card -->
        <div class="profile-card" id="profileCard">
            <div class="profile-avatar">👤</div>
            <div>
                <div class="profile-name" id="profileName">—</div>
                <div class="profile-meta" id="profileMeta"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card success-border">
                <div class="stat-label">Attendance %</div>
                <div class="stat-value" id="statPct">—</div>
                <div class="stat-sub" id="statPctSub"></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Days Present</div>
                <div class="stat-value" id="statDays">—</div>
                <div class="stat-sub" id="statDaysSub"></div>
            </div>
            <div class="stat-card warning-border">
                <div class="stat-label">Total Hours</div>
                <div class="stat-value" id="statHours">—</div>
                <div class="stat-sub">sessions recorded</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Working Days</div>
                <div class="stat-value" id="statTotal">—</div>
                <div class="stat-sub">since enrollment</div>
            </div>
        </div>

        <!-- Charts row -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="card-title">Weekly Attendance (Last 7 Days)</div>
                <canvas id="barChart" style="width:100%;height:180px;"></canvas>
            </div>
            <div class="chart-card"
                style="display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <div class="card-title" style="width:100%;">Attendance Rate</div>
                <div id="attendanceRing" class="attendance-ring"></div>
            </div>
        </div>

        <!-- Recent attendance table -->
        <div class="table-card">
            <div class="table-card-header">
                <h3 style="font-size:1rem;">Recent Attendance</h3>
                <span class="text-muted" style="font-size:.85rem;" id="recentCount"></span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="attendanceBody">
                    <tr>
                        <td colspan="4" class="text-center text-muted" style="padding:2rem;">Loading…</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {

            var s = requireAuth();
            if (!s) return;

            // Staff accidentally landing here
            if (s.user.role === 'staff' || s.user.role === 'admin') {
                window.location.href = 'staff.html';
                return;
            }

            document.getElementById('topbarName').textContent = s.user.name;
            document.getElementById('btnLogout').onclick = function () {
                clearSession();
                window.location.href = 'index.html';
            };

            try {
                var data = await apiStudentDashboard(s.user.id);

                if (data.error) {
                    showToast(data.error, 'error');
                    return;
                }

                var u = data.user;
                var st = data.stats;

                // Profile
                document.getElementById('profileName').textContent = u.name;
                var badges = [
                    u.roll_no ? ('Roll No: ' + u.roll_no) : null,
                    u.department ? u.department : null,
                    u.year ? u.year : null,
                    u.course_opted ? u.course_opted : null,
                    u.email ? u.email : null,
                ].filter(Boolean);
                document.getElementById('profileMeta').innerHTML = badges
                    .map(function (b) { return '<span class="profile-badge">' + b + '</span>'; })
                    .join('');

                // Stats
                var colorClass = st.percentage >= 75 ? '' : st.percentage >= 50 ? 'warning-border' : 'danger-border';
                document.querySelector('.stat-card.success-border').className = 'stat-card ' + colorClass;
                document.getElementById('statPct').textContent = st.percentage + '%';
                document.getElementById('statPctSub').textContent = st.percentage >= 75 ? 'Good standing ✓' : st.percentage >= 50 ? 'Needs improvement' : 'Below threshold ⚠';
                document.getElementById('statDays').textContent = st.present_days;
                document.getElementById('statDaysSub').textContent = 'out of ' + st.total_days + ' working days';
                document.getElementById('statHours').textContent = st.total_hours;
                document.getElementById('statTotal').textContent = st.total_days;

                // Attendance ring
                drawAttendanceRing('attendanceRing', st.percentage);

                // Bar chart (weekly)
                var weekly = data.weekly || [];
                var today = new Date();
                var labels = [], values = [];
                for (var i = 6; i >= 0; i--) {
                    var d = new Date(today);
                    d.setDate(today.getDate() - i);
                    var ds = d.toISOString().split('T')[0];
                    var rec = weekly.find(function (r) { return r.date === ds; });
                    labels.push(['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d.getDay()]);
                    values.push(rec ? rec.count : 0);
                }

                // Draw after layout paint
                requestAnimationFrame(function () {
                    var bar = document.getElementById('barChart');
                    drawBarChart(bar, labels, values);
                });

                // Recent table
                var recent = data.recent || [];
                document.getElementById('recentCount').textContent = recent.length + ' records';
                var tbody = document.getElementById('attendanceBody');
                if (!recent.length) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted" style="padding:2rem;">No attendance records yet</td></tr>';
                } else {
                    tbody.innerHTML = recent.map(function (r, i) {
                        return '<tr>'
                            + '<td>' + (i + 1) + '</td>'
                            + '<td>' + formatDate(r.timestamp) + '</td>'
                            + '<td>' + formatTime(r.timestamp) + '</td>'
                            + '<td><span style="color:var(--success);font-weight:600;">Present ✓</span></td>'
                            + '</tr>';
                    }).join('');
                }

            } catch (err) {
                showToast('Failed to load dashboard. Is the server running?', 'error');
            }

        });
    </script>
</body>

</html>
