<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Facial Attendance Marker — Secure biometric login">
    <title>SFAM — Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-animation"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">🎓</div>
                <h1>Facial Attendance</h1>
                <p>Sign in to your account</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" name="email"
                           placeholder="you@university.edu" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password"
                           placeholder="Enter your password" required>
                </div>

                <div class="form-group">
                    <label for="loginRole">Sign in as</label>
                    <select id="loginRole" name="role">
                        <option value="student">Student</option>
                        <option value="staff">Staff</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary btn-block btn-lg">
                    Sign In
                </button>
            </form>

            <div class="text-center mt-3">
                <p style="color: var(--text-secondary); font-size: 0.9rem;">
                    New student?
                    <a href="register.html" id="goRegister">Register with face scan</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Login page initialization
        document.addEventListener('DOMContentLoaded', function() {
            // Redirect if already logged in
            if (getSession()) {
                var user = getSession();
                redirectToDashboard(user.role);
            }

            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();

                var btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Signing in...';

                var email = document.getElementById('loginEmail').value.trim();
                var password = document.getElementById('loginPassword').value;

                try {
                    var result = await apiLogin(email, password);

                    if (result.error) {
                        showToast(result.error, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Sign In';
                        return;
                    }

                    // Store session
                    saveSession(result.token, result.user);
                    showToast('Welcome back, ' + result.user.name + '!', 'success');

                    setTimeout(function() {
                        redirectToDashboard(result.user.role);
                    }, 800);

                } catch (err) {
                    showToast('Connection error. Is the server running?', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            });
        });
    </script>
</body>
</html>
